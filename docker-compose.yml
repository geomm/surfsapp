version: '3.8'

networks:
  surfsapp-network:
    driver: bridge

volumes:
  ui-node-modules:
  backend-node-modules:
  mongo-data:

services:
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - '5173:5173'
    volumes:
      - ./ui:/app
      - ui-node-modules:/app/node_modules
    env_file:
      - .env
    networks:
      - surfsapp-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - backend-node-modules:/app/node_modules
    env_file:
      - .env
    depends_on:
      - mongo
    networks:
      - surfsapp-network

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
      - ./backend/src/db/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - surfsapp-network
